# Pre-commit hooks for ai-qa-automation
# Install with: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files
# Docs: https://pre-commit.com

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Matches the installed ruff (0.15.20); required for target-version = "py314".
    rev: v0.15.20
    hooks:
      # Run ruff linter (with auto-fix)
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
      # Run ruff formatter
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    # Matches the installed mypy (2.1.0).
    rev: v2.1.0
    hooks:
      - id: mypy
        files: ^src/
        args:
          - --config-file=pyproject.toml
        additional_dependencies:
          - fastapi>=0.115.0
          - pydantic>=2.4.0
          - pydantic-settings>=2.4.0
          - mcp>=1.6.0
          - sqlalchemy>=2.0
          - cryptography>=43  # types for ai_qa.db.types Fernet usage
          - tenacity>=8.0.0  # typed @retry decorators (client/script_generator/vision_locator)
