  # ============================================================
  # 2026-06-23 - NEW Epic 20 inserted after Epic 19 via sprint planning (Thuong).
  #   Roadmap shift: former Epic 20 Audit/Metrics -> 21, Claude SSO 21 -> 22, Company SSO
  #   22 -> 23 (epics.md headings + sprint-status keys updated). No story files existed for
  #   those epics (all backlog) -> nothing to rename on disk.
  #
  #   Epic 20 - Retrieval-Augmented Requirements (RAG) for context-bounded generation.
  #   PROBLEM: Mary loads ALL of Bob's extracted requirements (whole Confluence space) + the
  #   Jira ticket before reasoning; a small project already eats >100k context and a larger
  #   space overflows. Goal: read only the few RELEVANT pages, like a dev opening just the
  #   Confluence pages that matter.
  #   RECOMMENDED APPROACH (Thuong to confirm): hierarchy-aware SEMANTIC retrieval over
  #   LLM-enriched page-level descriptions. NOT full Graph RAG (overkill; parent/child tree
  #   already captured via Artifact.parent_source_id / 16-8 ancestor chain). NOT plain
  #   keyword/JSON (brittle on terse titles = the core complaint). Page-level (read whole
  #   relevant pages), not chunk-level. Each page indexed by title + enriched description
  #   (LLM-generated from the page's own content + bottom-up roll-up of child-page summaries)
  #   + embedding; query (Jira ticket / test target) -> top-K relevant pages -> Mary loads
  #   only those, with a full-load fallback below a size threshold (small projects unchanged).
  #   DECISION GATES (bake into the PRD/stories):
  #     (1) Embedding model MUST run on the air-gapped on-prem host (LiteLLM proxy
  #         https://ai.svc.corp.ch/api) - confirm an embedding endpoint exists; else fall back
  #         to lexical/BM25 or a small bundled local embedder. (see memory
  #         uat-airgapped-egress-model-transfer.md - UAT has NO internet/proxy)
  #     (2) Vector storage: pgvector (Postgres-only) vs embedding-as-JSON + cosine in Python
  #         (cross-dialect default; also works in the SQLite suite). Default JSON+Python at
  #         project scale (hundreds of pages).
  #     (3) Retrieval tuning: top-K, similarity threshold, hierarchy expansion for parent context.
  #   Conventions: persisted descriptions/index data stay English (App-UI-English-only);
  #   embedding calls follow per-user-secret + no-leak rules; index works under Postgres + SQLite.
  #   SYNERGY: 20-6 reuses Epic 18 source-change detection to re-index only deltas.
  #   Graph RAG (entity/relationship extraction) explicitly DEFERRED.
  #   Stories still need bmad-create-story (status=backlog until story files exist).
  #   Dev order: 20-1 (index table+migration) -> 20-2 (enriched descriptions) -> 20-3
  #     (embeddings + on-prem/lexical fallback) -> 20-4 (semantic retrieval) -> 20-5 (Mary
  #     integration + full-load fallback = the payoff) -> 20-6 (incremental re-index) -> 20-7
  #     (transparency + tuning).
  # ============================================================
  epic-20: backlog
  20-1-page-retrieval-index-foundation: backlog
  20-2-llm-enriched-page-descriptions-with-hierarchy-rollup: backlog
  20-3-embedding-generation-via-onprem-compatible-provider: backlog
