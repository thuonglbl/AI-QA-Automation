services:
  db:
    image: postgres:18-alpine
    container_name: ai_qa_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:4.31
    container_name: ai_qa_seaweedfs
    restart: always
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
    command: server -s3 -dir=/data

volumes:
  postgres_data:
  seaweedfs_data:
